server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Never cache the entry points — browser must always fetch fresh
    location ~* (index\.html|flutter_service_worker\.js|flutter\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Content-hashed assets are safe to cache forever
    location ~* \.(js|css|png|jpg|svg|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
